name: Daily Reel (11 AM IST)

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC = 11:00 IST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build & commit content but skip the Instagram API call"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: ig-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Verify ffmpeg
        run: ffmpeg -version | head -1
      - name: Post daily reel
        env:
          IG_USER_ID:       ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:  ${{ secrets.IG_ACCESS_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DRY_RUN:          ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '' }}
        run: npm run post:reel
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `posting-failure: reel (${new Date().toISOString().slice(0,10)})`,
              labels: ["posting-failure"],
              body: `Workflow [${context.workflow}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed.`
            });
