name: Check IG token validity

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check token
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          echo "=== Token length ==="
          echo -n "$IG_ACCESS_TOKEN" | wc -c

          echo "=== Graph API /me ==="
          curl -s "https://graph.facebook.com/v21.0/me?access_token=$IG_ACCESS_TOKEN" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'error' in d:
            print('TOKEN INVALID:', d['error']['message'])
          else:
            print('TOKEN VALID — account:', d.get('name', d))
          "

          echo "=== Permissions ==="
          curl -s "https://graph.facebook.com/v21.0/me/permissions?access_token=$IG_ACCESS_TOKEN" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error']['message'])
          else:
            for p in d.get('data', []):
              print(p['permission'], '-', p['status'])
          "

          echo "=== IG account ==="
          curl -s "https://graph.facebook.com/v21.0/$IG_USER_ID?fields=username,account_type&access_token=$IG_ACCESS_TOKEN" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error']['message'])
          else:
            print('Username:', d.get('username'), '| Type:', d.get('account_type'))
          "
