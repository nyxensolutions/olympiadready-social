name: Morning quiz (7 AM IST)

on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC = 07:00 IST
  workflow_dispatch:        # manual trigger button in the Actions tab
    inputs:
      dry_run:
        description: "Build & commit content but skip the Instagram API call"
        type: boolean
        default: false

permissions:
  contents: write           # so the bot can commit generated content
  issues: write             # so failures can auto-open an issue

concurrency:
  group: ig-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install deps
        run: npm ci || npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Post morning quiz
        env:
          IG_USER_ID:     ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          DRY_RUN:        ${{ inputs.dry_run == true && '1' || '' }}
        run: npm run post:morning
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `posting-failure: morning quiz (${new Date().toISOString().slice(0,10)})`,
              labels: ["posting-failure"],
              body: `Workflow [${context.workflow}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed. See logs.`
            });
